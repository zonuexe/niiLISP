# cargo-about configuration. Generates THIRD-PARTY-LICENSES.md (embedded into the
# binary and printed by `niilisp license`) from the dependencies bundled into the
# release binary. Regenerate with:
#
#   cargo about generate about.hbs -o THIRD-PARTY-LICENSES.md
#
# `accepted` is the set of licenses allowed to appear; keep it in sync with
# deny.toml's `[licenses] allow` (the CI audit). cargo-about fails if a dependency
# uses a license not listed here.

accepted = [
    "GPL-3.0-or-later",
    "MIT",
    "ISC",
    # Boost Software License — permissive, GPLv3-compatible. Windows-only, via
    # rustyline's clipboard support (clipboard-win / error-code).
    "BSL-1.0",
]

# The union across every published-binary platform is what ships, so notices are
# collected for all of them (see .github/workflows/release.yml). The Windows
# build is pure (no FFI), so its native deps differ — hence the per-target audit.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

# Dev/build-only crates aren't shipped, so their notices don't belong here.
ignore-dev-dependencies = true
