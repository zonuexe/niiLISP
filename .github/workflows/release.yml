name: Release

# On a `vX.Y.Z` tag: publish to crates.io, create a GitHub Release from
# CHANGELOG.md, and attach pre-built binaries for each platform. Requires the
# repository secret CARGO_REGISTRY_TOKEN (a crates.io API token). See
# .claude/skills/niilisp-release-prep/SKILL.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release and upload binary assets

jobs:
  # Gate: every shipped target must COMPILE before the irreversible crates.io
  # publish. A `cfg(windows)` / `cfg(not(unix))` error that the Linux/macOS CI
  # can't see (it shipped a broken 0.3.0) aborts the release here, not after
  # publishing. Builds on native runners, exactly as the binaries do.
  build-check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            no-default-features: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Install libffi (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libffi-dev
      - name: Compile (release, as it ships)
        run: cargo build --release ${{ matrix.no-default-features && '--no-default-features' || '' }}

  publish-crate:
    needs: build-check # publish only if every target compiled
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Check tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate="$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')"
          echo "tag=$tag crate=$crate"
          if [ "$tag" != "$crate" ]; then
            echo "::error::tag v$tag does not match Cargo.toml version $crate"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Extract this version's section from CHANGELOG.md as the release body.
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" { p = 1; next }
            p && /^## \[/ { exit }
            p { print }
          ' CHANGELOG.md > release-body.md
          if [ ! -s release-body.md ]; then
            echo "Release ${GITHUB_REF_NAME}." > release-body.md
          fi
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-body.md

  binaries:
    needs: publish-crate # upload to the Release created above
    # Each Unix target builds on a NATIVE runner so it links its own system
    # libffi (no cross-compilation); Windows builds pure. See ADR-0018.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest # x86_64 Linux (native)
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm # arm64 Linux (native)
            target: aarch64-unknown-linux-gnu
          - os: macos-latest # arm64 macOS (native)
            target: aarch64-apple-darwin
          - os: windows-latest # Windows ships pure (no FFI)
            target: x86_64-pc-windows-msvc
            no-default-features: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # The `ffi` feature dynamically links the system libffi (ADR-0018).
      - name: Install libffi (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libffi-dev

      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: niilisp
          target: ${{ matrix.target }}
          archive: $bin-$tag-$target
          # Unix ships with the default `ffi`; Windows ships pure.
          no-default-features: ${{ matrix.no-default-features || false }}
          token: ${{ secrets.GITHUB_TOKEN }}
