name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive # references/newlisp is needed by tests/qa.rs
      - name: Install libffi (system libffi for the ffi feature, ADR-0018)
        run: sudo apt-get update && sudo apt-get install -y libffi-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (no default features / pure build)
        run: cargo clippy --no-default-features --all-targets -- -D warnings
      - name: Test (default features, with FFI)
        run: cargo test
      - name: Build (no default features / pure build)
        run: cargo build --no-default-features
      - name: Docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Package (dry run)
        run: cargo publish --dry-run
