name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive # references/newlisp is needed by tests/qa.rs
      - name: Install libffi (system libffi for the ffi feature, ADR-0018)
        run: sudo apt-get update && sudo apt-get install -y libffi-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --check
      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (no default features / pure build)
        run: cargo clippy --no-default-features --all-targets -- -D warnings
      - name: Test (default features, with FFI)
        run: cargo test
      - name: Build (no default features / pure build)
        run: cargo build --no-default-features
      - name: Install cargo-about + cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-about,cargo-deny
      - name: License audit
        # Fail if any dependency uses a license outside deny.toml's allow list —
        # so a new dep under an unexpected (e.g. incompatible-copyleft) license
        # can't slip in unnoticed.
        run: cargo deny check licenses
      - name: Third-party licenses up to date
        # The embedded THIRD-PARTY-LICENSES.md must match the current dependency
        # tree — a binary-only distribution relies on it for its deps' notices.
        # Regenerate with cargo-about and fail if it drifted.
        run: |
          cargo about generate about.hbs -o THIRD-PARTY-LICENSES.md
          git diff --exit-code -- THIRD-PARTY-LICENSES.md \
            || { echo "::error::THIRD-PARTY-LICENSES.md is stale — run: cargo about generate about.hbs -o THIRD-PARTY-LICENSES.md"; exit 1; }
      - name: Docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
      - name: Package (dry run)
        run: cargo publish --dry-run
